const CORS_PROXY = "https://api.allorigins.win/raw?url=";

async function fetchYahoo(symbol) {
  // 1차: Yahoo Finance
  try {
    const url = `${CORS_PROXY}${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1d&interval=1d`)}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const meta = data?.chart?.result?.[0]?.meta;
    if (meta?.regularMarketPrice > 0) return meta.regularMarketPrice;
  } catch {}
  // 2차: Yahoo v7 quote API
  try {
    const url2 = `${CORS_PROXY}${encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`)}`;
    const res2 = await fetch(url2, { signal: AbortSignal.timeout(8000) });
    const data2 = await res2.json();
    const price = data2?.quoteResponse?.result?.[0]?.regularMarketPrice;
    if (price > 0) return price;
  } catch {}
  // 3차: Google Finance 스크래핑 via CORS proxy
  try {
    const url3 = `${CORS_PROXY}${encodeURIComponent(`https://www.google.com/finance/quote/${symbol}:NASDAQ`)}`;
    const res3 = await fetch(url3, { signal: AbortSignal.timeout(8000) });
    const text = await res3.text();
    const match = text.match(/data-last-price="([\d.]+)"/);
    if (match && parseFloat(match[1]) > 0) return parseFloat(match[1]);
  } catch {}
  return null;
}

async function fetchUpbit(market) {
  try {
    const res = await fetch(`https://api.upbit.com/v1/ticker?markets=${market}`, { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    return data?.[0]?.trade_price || null;
  } catch { return null; }
}

async function fetchExchangeRate() {
  // 1차: 두나무 API (업비트 환율)
  try {
    const res1 = await fetch("https://quotation-api-cdn.dunamu.com/v1/forex/recent?codes=FRX.KRWUSD", { signal: AbortSignal.timeout(5000) });
    const data1 = await res1.json();
    if (data1?.[0]?.basePrice > 0) return data1[0].basePrice;
  } catch {}
  // 2차: Yahoo Finance via CORS proxy
  try {
    const url = `${CORS_PROXY}${encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/USDKRW=X?range=1d&interval=1d")}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const rate = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
    if (rate > 0) return rate;
  } catch {}
  // 3차: 한국은행 Open API (공시 환율) via CORS proxy
  try {
    const today = new Date();
    const dateStr = today.toISOString().slice(0, 10).replace(/-/g, '');
    const bokUrl = `${CORS_PROXY}${encodeURIComponent(`https://www.koreaexim.go.kr/site/program/financial/exchangeJSON?authkey=SAMPLE&searchdate=${dateStr}&data=AP01`)}`;
    const res3 = await fetch(bokUrl, { signal: AbortSignal.timeout(5000) });
    const data3 = await res3.json();
    const usd = data3?.find(d => d.cur_unit === "USD");
    if (usd) { const v = parseFloat(usd.deal_bas_r.replace(/,/g, "")); if (v > 0) return v; }
  } catch {}
  return 1509;
}

// ─── 분석 엔진 ───────────────────────────────────────────────
function fundamentalScore(s) {
  if (s.market === "CRYPTO") return 50;
  let sc = 50;
  if (s.per > 0 && s.per < 10) sc += 15; else if (s.per < 20) sc += 10; else if (s.per < 40) sc += 5; else if (s.per >= 80) sc -= 10;
  if (s.pbr > 0 && s.pbr < 1) sc += 15; else if (s.pbr < 3) sc += 8; else if (s.pbr >= 6) sc -= 5;
  if (s.roe > 20) sc += 20; else if (s.roe > 15) sc += 15; else if (s.roe > 10) sc += 10; else if (s.roe > 5) sc += 5; else if (s.roe <= 0) sc -= 10;
  return Math.max(0, Math.min(100, sc));
}

function technicalScore(s) {
  let sc = 50;
  const rsi = s.rsi || 50;
  if (rsi < 30) sc += 20; else if (rsi < 40) sc += 10; else if (rsi < 50) sc += 3; else if (rsi > 70) sc -= 15; else if (rsi > 60) sc -= 5;
  if (s.macd === "bullish") sc += 15; else if (s.macd === "bearish") sc -= 15;
  return Math.max(0, Math.min(100, sc));
}

function decide(s, cashTotal, totalAsset) {
  const fS = fundamentalScore(s);
  const tS = technicalScore(s);
  const total = s.market === "CRYPTO" ? tS : fS * 0.35 + tS * 0.45 + 50 * 0.2;
  const ret = s.avg > 0 ? ((s.price - s.avg) / s.avg * 100) : 0;
  const valKRW = s.qty * toKRW(s.price, s.market, DEFAULT_USD_KRW);
  const pct = totalAsset > 0 ? (valKRW / totalAsset * 100) : 0;
  let action, color, reasons = [];

  if (s.market === "CRYPTO") {
    if (s.rsi < 30) { action = "분할 매수 기회"; color = "green"; reasons.push("RSI 트리플 과매도", "공포지수 극단"); }
    else if (s.rsi > 70) { action = "부분 매도"; color = "red"; reasons.push("RSI 과매수"); }
    else { action = "보유 유지"; color = "gray"; reasons.push("중립 구간"); }
    if (ret < -20) reasons.push(`손실 ${ret.toFixed(1)}%`);
  } else if (ret < -20) {
    action = "손절 매도"; color = "red"; reasons = [`손실 ${ret.toFixed(1)}%`, "손절 기준(-20%) 초과"];
  } else if (ret > 50) {
    action = "부분 매도"; color = "red"; reasons = [`수익 +${ret.toFixed(1)}%`, "차익실현 권장"];
  } else if (total >= 70) {
    if (pct < 25) { action = "적극 매수"; color = "green"; reasons.push(`종합 ${total.toFixed(0)}점`); }
    else { action = "보유 (비중↑)"; color = "blue"; reasons.push("비중 충분, 유지"); }
    if (fS >= 65) reasons.push("재무 우수");
    if (tS >= 65) reasons.push("기술적 매수");
  } else if (total >= 55) {
    action = "보유 유지"; color = "gray"; reasons.push(`종합 ${total.toFixed(0)}점`, "관망");
  } else if (total >= 40) {
    action = "보유 (주의)"; color = "yellow"; reasons.push(`종합 ${total.toFixed(0)}점`);
    if (ret > 15) { action = "부분 매도"; color = "red"; reasons.push(`수익 +${ret.toFixed(1)}%`); }
  } else {
    action = "매도 권장"; color = "red"; reasons.push(`종합 ${total.toFixed(0)}점`, "약세");
  }
  if (s.note) reasons.push(s.note);
  return { action, color, fS, tS, total, ret, reasons, valKRW, pct };
}

  const [fetchStatus, setFetchStatus] = useState("");
  const [news, setNews] = useState([]);
  const [serverConnected, setServerConnected] = useState(false);

  const getAnalysisDefaults = (code) => {
    const defaultItem = MY_HOLDINGS.find(h => h.code === code);
    return defaultItem ? { per: defaultItem.per, pbr: defaultItem.pbr, roe: defaultItem.roe, rsi: defaultItem.rsi, macd: defaultItem.macd, sector: defaultItem.sector, note: defaultItem.note } : { per: 0, pbr: 0, roe: 0, rsi: 50, macd: "neutral", sector: "기타", note: "" };
  };

  const refreshPrices = useCallback(async () => {
    setLoading(true);
    setFetchStatus("시세 업데이트 중...");
    let updated = 0, failed = 0;
    let usedServer = false;

    // 서버에서 포트폴리오 데이터 시도
    const serverData = await fetchPortfolioFromServer();

    if (serverData && serverData.domestic) {
      usedServer = true;
      setServerConnected(true);

      // 환율 업데이트 (서버에서 제공, 실패 시 직접 조회)
      if (serverData.exchangeRate && serverData.exchangeRate.usdKrw && serverData.exchangeRate.usdKrw !== 1450) {
        setUsdKrw(serverData.exchangeRate.usdKrw);
        DEFAULT_USD_KRW = serverData.exchangeRate.usdKrw;
      } else {
        const rate = await fetchExchangeRate();
        if (rate) { setUsdKrw(rate); DEFAULT_USD_KRW = rate; }
      }

      // 국내 주식 매핑 (서버 데이터 + 분석 파라미터)
      const mappedDomestic = (serverData.domestic.holdings || []).map(h => ({
        name: h.name,
        code: h.code,
        market: "KRX",
        qty: h.quantity,
        avg: h.avgPrice,
        price: h.currentPrice,
        ...getAnalysisDefaults(h.code),
      }));

      // ISA 매핑 (서버 데이터 + 분석 파라미터)
      let mappedIsa = { ...ISA, holdings: [...ISA.holdings] };
      if (serverData.isa && serverData.isa.holdings && serverData.isa.holdings.length > 0) {
        mappedIsa.holdings = serverData.isa.holdings.map(h => {
          const defaultData = ISA.holdings.find(ih => ih.code === h.code);
          return {
            name: h.name,
            code: h.code,
            qty: h.quantity,
            avg: h.avgPrice,
            price: h.currentPrice,
            eval: h.evalAmount,
            pnl: h.evalPnl,
            ret: h.returnPct,
            sector: defaultData?.sector || "기타",
          };
        });
        if (serverData.isa.summary) {
          mappedIsa.cash = serverData.isa.summary.availableCash || ISA.cash;
        }
      }
      // ISA 서버 데이터가 비어있으면 기존 하드코딩 데이터 유지

      // 해외 주식 매핑 (서버 데이터 + 분석 파라미터, 거래소별 중복 제거)
      const overseasRaw = (serverData.overseas && serverData.overseas.holdings || []);
      const overseasDeduped = [];
      const seenOverseasCodes = new Set();
      for (const h of overseasRaw) {
        if (!seenOverseasCodes.has(h.code)) {
          seenOverseasCodes.add(h.code);
          overseasDeduped.push(h);

      }
      const mappedOverseas = overseasDeduped.map(h => ({
        name: h.name,

        qty: h.quantity,
        avg: h.avgPrice,

      // 암호화폐 매핑 (서버 데이터 + 분석 파라미터)

        code: h.code.replace("KRW-", ""),

      // ISA ETF 업데이트

            </div>
          </div>
          <div className="bg-gray-50 border rounded-lg px-4 py-2 text-xs text-gray-500">⚠️ 위 추천은 2026-03-30 기준 참고용 분석입니다.</div>
        </>}

        {/* ════ ISA 계좌 ════ */}
        {tab === "isa" && (() => {
          const _isaTotal = isaData.cash + isaData.holdings.reduce((s, h) => s + h.eval, 0);
          const _isaPnl = isaData.holdings.reduce((s, h) => s + h.pnl, 0);
          const _isaRet = (isaData.totalDeposit - isaData.cash) > 0 ? (_isaPnl / (isaData.totalDeposit - isaData.cash) * 100) : 0;
          const depositPct = (isaData.totalDeposit / isaData.annualLimit * 100);
          const _isaInvested = isaData.holdings.reduce((s, h) => s + (h.eval - h.pnl), 0);
          const taxFreeUsed = Math.max(0, _isaPnl);
          const taxFreeRemain = Math.max(0, isaData.taxFreeLimit - taxFreeUsed);
          const taxableAmount = Math.max(0, _isaPnl - isaData.taxFreeLimit);
          const taxDue = taxableAmount * (isaData.overTaxRate / 100);
          const openDate = new Date("2026-02-01");
          const maturityDate = new Date(openDate);
          maturityDate.setFullYear(maturityDate.getFullYear() + isaData.mandatoryYears);
          const now = new Date();
          const daysRemain = Math.ceil((maturityDate - now) / (1000 * 60 * 60 * 24));
          const monthsHeld = Math.round((now - openDate) / (1000 * 60 * 60 * 24 * 30));

          return <>
            <div className="bg-white rounded-xl p-4 border shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <h2 className="text-sm font-bold text-gray-900">🏦 ISA 중개형 계좌</h2>
                  <p className="text-xs text-gray-400">{isaData.account} · {isaData.opened} 개설 · 의무보유 {isaData.mandatoryYears}년</p>
                </div>
                <div className="text-right">
                  <p className="text-xs text-gray-400">계좌 총액</p>
                  <p className="text-xl font-bold">{fmtFull(_isaTotal)}<span className="text-sm font-normal text-gray-500">원</span></p>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-indigo-50 rounded-lg p-3 text-center">
                  <p className="text-xs text-indigo-500">예수금</p>
                  <p className="text-lg font-bold text-indigo-700">{fmtFull(isaData.cash)}원</p>
                </div>
                <div className="bg-emerald-50 rounded-lg p-3 text-center">
                  <p className="text-xs text-emerald-500">주식 평가</p>
                  <p className="text-lg font-bold text-emerald-700">{fmtFull(_isaInvested + _isaPnl)}원</p>
                  <p className={`text-xs font-semibold ${pnlColor(_isaPnl)}`}>{pnlSign(_isaPnl)}{fmtFull(_isaPnl)}원</p>
                </div>
                <div className="bg-amber-50 rounded-lg p-3 text-center">
                  <p className="text-xs text-amber-500">의무보유 잔여</p>
                  <p className="text-lg font-bold text-amber-700">{daysRemain}일</p>
                  <p className="text-xs text-amber-400">{monthsHeld}개월 / {isaData.mandatoryYears * 12}개월</p>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-xl p-4 border shadow-sm">
              <h2 className="text-sm font-bold text-gray-900 mb-3">💰 연간 납입 현황</h2>
              <div className="flex items-center gap-3 mb-2">
                <div className="flex-1 h-4 bg-gray-200 rounded-full overflow-hidden">
                  <div className="h-full bg-indigo-500 rounded-full" style={{width:`${Math.min(100, depositPct)}%`}} />
                </div>
                <span className="text-sm font-bold text-indigo-700">{depositPct.toFixed(1)}%</span>
              </div>
              <p className="text-xs text-gray-500">{fmtFull(isaData.totalDeposit)}원 / {fmtFull(isaData.annualLimit)}원 (잔여 {fmtFull(isaData.annualLimit - isaData.totalDeposit)}원)</p>
            </div>

            <div className="bg-white rounded-xl p-4 border shadow-sm">
              <h2 className="text-sm font-bold text-gray-900 mb-3">🧾 세금 혜택</h2>
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div className="border rounded-lg p-3">
                  <p className="text-xs text-gray-400">비과세 한도</p>
                  <p className="text-lg font-bold text-emerald-700">{fmtFull(isaData.taxFreeLimit)}원</p>
                  <p className="text-xs text-emerald-600 mt-1">남은 비과세: {fmtFull(taxFreeRemain)}원</p>
                </div>
                <div className="border rounded-lg p-3">
                  <p className="text-xs text-gray-400">손익통산</p>
                  <p className={`text-lg font-bold ${pnlColor(_isaPnl)}`}>{pnlSign(_isaPnl)}{fmtFull(_isaPnl)}원</p>
                  <p className="text-xs text-gray-500 mt-1">예상 세금: {taxDue > 0 ? fmtFull(taxDue) + "원" : "0원"}</p>
                </div>
              </div>
              <div className="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-800">
                💡 ISA 내 4개 ETF 손익이 합산되어 순이익에만 과세됩니다.
              </div>
            </div>

            <div className="bg-white rounded-xl p-4 border shadow-sm">
              <h2 className="text-sm font-bold text-gray-900 mb-3">📊 ISA 보유 종목</h2>
              <div className="space-y-2">
                {isaData.holdings.map((h, i) => (
                  <div key={i} className="flex items-center justify-between border rounded-lg p-3 hover:bg-gray-50">
                    <div className="flex items-center gap-2">
                      <Badge c="blue">🇰🇷 ETF</Badge>
                      <div>
                        <p className="font-semibold text-sm">{h.name}</p>
                        <p className="text-xs text-gray-400">{h.code} · {h.qty}주 · 평단 {fmtFull(h.avg)}원</p>
                      </div>
                    </div>
                    <div className="text-right">
                      <p className="text-sm font-bold">{fmtFull(h.eval)}원</p>
                      <p className={`text-xs font-semibold ${pnlColor(h.pnl)}`}>{pnlSign(h.pnl)}{fmtFull(h.pnl)}원 ({pnlSign(h.ret)}{h.ret.toFixed(2)}%)</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
              <p className="text-xs font-bold text-amber-800 mb-1">📋 관리 포인트</p>
              <div className="space-y-1 text-xs text-amber-800">
                <p>• 2029.02 전 해지 시 세금 혜택 반환 · 올해 잔여 3,500만원 납입 가능 · 분기 1회 비중 점검</p>
              </div>
            </div>
          </>;
        })()}

        {/* 종목 상세 탭은 종목 분석 탭으로 통합됨 */}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StockAdvisor />);
</script>
</body>
</html>
